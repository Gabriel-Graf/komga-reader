# JDK 21 is required (not 17): the pure-Kotlin modules (domain, source-*, plugin-api/-sdk,
# guided-view) build with `kotlin { jvmToolchain(21) }` → Java-21 bytecode (class v65). The
# non-toolchained Android consumers' javac must run on a JDK that can read it, i.e. ≥21. Building
# on JDK 17 fails with "class file has wrong version 65.0, should be 61.0". Keep this at 21.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # JVM unit tests across all modules — pure, no device. Fast, always runs.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        run: ./gradlew test --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-reports
          path: '**/build/reports/tests/'

  # Build the debug + androidTest APKs. Needs the pinned NDK + CMake because render-crengine
  # cross-compiles its arm64-v8a JNI bridge against the committed crengine prefix.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Install pinned NDK + CMake (render-crengine arm64 JNI)
        run: sdkmanager "ndk;28.2.13676358" "cmake;3.22.1"
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug + androidTest APKs
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

# The heavy integration suite (ci.* androidTest against Komga/Kavita Docker fixtures on an emulator)
# lives in its own scheduled pipeline — see .github/workflows/integration.yml. It runs nightly + on
# demand, not on every push/PR, so the fast unit+build gate above stays quick.
