# 3 Komga-Instanzen für Integrationstests. Content read-only gemountet (schützt Repo-Fixtures),
# config-Volumes pro Instanz (halten Scan-Ergebnis → Volume-Cache).
services:
  komga-a:
    image: gotson/komga:latest
    ports: ["25701:25600"]
    environment:
      - KOMGA_LIBRARIES_SCAN_STARTUP=false
    volumes:
      - komga-a-config:/config
      - ./content/manga:/content/manga:ro
      - ./content/novels-a:/content/novels-a:ro
  komga-b:
    image: gotson/komga:latest
    ports: ["25702:25600"]
    environment:
      - KOMGA_LIBRARIES_SCAN_STARTUP=false
    volumes:
      - komga-b-config:/config
      - ./content/webtoon:/content/webtoon:ro
      - ./content/novels-b:/content/novels-b:ro
  komga-c:
    image: gotson/komga:latest
    ports: ["25703:25600"]
    environment:
      - KOMGA_LIBRARIES_SCAN_STARTUP=false
    volumes:
      - komga-c-config:/config
      - ./content/manga:/content/manga:ro
      - ./content/novels-a:/content/novels-a:ro
  # Kavita als zweite Server-Art für den Source-Plugin-E2E (Kavita-Quellen-Plugin). Bewusst
  # dieselben CC0-Manga-Fixtures wie Komga — bekannter, deterministischer Inhalt; eigener Port.
  kavita:
    image: jvmilazz0/kavita:latest
    ports: ["25710:5000"]
    volumes:
      - kavita-config:/kavita/config
      - ./content/manga:/manga:ro
volumes:
  komga-a-config:
  komga-b-config:
  komga-c-config:
  kavita-config:
