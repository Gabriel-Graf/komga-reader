# make.conf for komga-reader render-crengine dependency cross-build (arm64-v8a).
# Reproduces the LxReader thirdparty-bldtool recipe against this machine's NDK/SDK.

# Position-independent code (required for linking into a shared lib later).
CFLAGS="-fPIC -DPIC"
CXXFLAGS="$CFLAGS"

# parallel make
MAKEOPTS=-j8

# Android SDK / NDK on this machine
ANDROID_HOME=/home/gabriel/Android/Sdk
ANDROID_NDK_HOST_TAG=linux-x86_64
ANDROID_NDK_ROOT=/home/gabriel/Android/Sdk/ndk/28.2.13676358
ANDROID_CMAKE=/home/gabriel/Android/Sdk/cmake/3.22.1

# Enable support for 16 KB page sizes (Android 15+ / Boox-class devices).
ANDROID_PAGE_SIZE_16K=ON
